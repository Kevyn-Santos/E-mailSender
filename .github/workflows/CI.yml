# Checkout
# Instalar Python 3.12
# Instalar Dependencias pip
# Realizar testes(pytest: scripts/tests/) e compilar atifact
# Criar a Docker image
# Subir a Docker image no Dockerhub(com Tagging)

name: Integration and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  
  lint:
    runs-on: ubuntu-latest
    name: Validação de código e ortográfia

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Instalar Dependencias
        run: |
          pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir -r requirements.txt 
      
      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
      
      - run: pytest
      
      